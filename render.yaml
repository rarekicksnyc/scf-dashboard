# Render deployment blueprint. In the Render dashboard: New -> Blueprint ->
# connect this repo. Render reads this file and creates the service. You then
# fill in DATABASE_URL (a secret, not stored in the repo); SESSION_SECRET is
# generated automatically.
#
# Runs as a SINGLE always-on Node instance (the in-memory cache is per-process),
# with durable state in Postgres via DATABASE_URL.

services:
  - type: web
    name: scf-dashboard
    runtime: node
    plan: starter # always-on. Use "free" for a demo (sleeps after ~15 min idle).
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SESSION_SECRET
        generateValue: true # Render generates a strong random secret
      - key: DATABASE_URL
        sync: false # enter your (rotated) Neon connection string in the dashboard
      # Optional: uncomment and set a shared demo password (defaults to demo1234).
      # - key: DEMO_PASSWORD
      #   sync: false
      # Optional: uncomment to add an extra shared HTTP Basic gate on top of login.
      # - key: APP_PASSWORD
      #   sync: false
